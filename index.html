      new MutationObserver((mutations) => {
        for (let m of mutations) {
          m.addedNodes.forEach(checkAndKill);
        }
      }).observe(root, { childList: true, subtree: true });
    };
    observeChanges(document.documentElement);
    document.querySelectorAll('*').forEach(checkAndKill);
  })();
</script>
