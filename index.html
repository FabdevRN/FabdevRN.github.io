<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HVAC Profit Master - Compute true pre-tax job profitability">
    <title>Hvac Profit Master | Sign-in Portal</title>
    <link rel="icon" href="data:," />
    <style>
        @import url('https://googleapis.com');
        
        body {
            margin: 0;
            font-family: 'IBM+Plex+Sans', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: #18181b;
            border: 2px solid #27272a;
        }
        .brand {
            color: #eab308;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #a1a1aa;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            background: #09090b;
            border: 2px solid #27272a;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #eab308;
            outline: none;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #eab308;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: #facc15;
        }
        #emergent-badge, [id*="emergent-badge"], [class*="emergent-badge"], a[href*="emergent.sh"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand">HVAC Profit Master</div>
        <h2 style="margin: 0 0 0.5rem 0; text-transform: uppercase; font-weight: 900;">Sign In</h2>
        <p style="color: #71717a; font-size: 0.875rem; margin-bottom: 2rem;">Use the credentials issued by your admin.</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>

    <!-- Custom Static Auth Router Workaround Script -->
    <script>
      document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const emailInput = document.getElementById('email').value.trim().toLowerCase();
        const passwordInput = document.getElementById('password').value.trim();

        // Admin Credentials
        if (emailInput === "admin@hvacprofit.com" && passwordInput === "Admin@12345") {
          sessionStorage.setItem("hvac_session", "active");
          window.location.href = "hvac-portal-987.html";
        } 
        // Client Credentials Example
        else if (emailInput === "client@company.com" && passwordInput === "Pass2026!") {
          sessionStorage.setItem("hvac_session", "active");
          window.location.href = "hvac-portal-987.html";
        }
        else {
          alert("Invalid login credentials. Please check with your system administrator.");
        }
      });
    </script>
</body>
</html>
